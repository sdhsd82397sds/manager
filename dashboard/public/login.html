<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Dashboard - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }
    .orb1 { width: 400px; height: 400px; background: #5865f2; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb3 { width: 200px; height: 200px; background: #06b6d4; top: 50%; left: 60%; animation-delay: -2s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo .icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #5865f2, #8b5cf6);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(88,101,242,0.4);
    }
    .logo h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #f87171;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show { display: block; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input[type="password"]:focus {
      border-color: #5865f2;
      box-shadow: 0 0 0 3px rgba(88,101,242,0.2);
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #5865f2, #8b5cf6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
    }
    button[type="submit"]:hover { opacity: 0.9; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    .hint { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 12px; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="card">
    <div class="logo">
      <div class="icon">🤖</div>
      <h1>Bot Dashboard</h1>
      <p>sign in to manage your server</p>
    </div>
    <div class="error-msg" id="error">wrong password, try again</div>
    <form method="POST" action="/login">
      <label for="password">Dashboard Password</label>
      <input type="password" id="password" name="password" placeholder="enter your password" autofocus />
      <button type="submit">Sign In</button>
    </form>
    <p class="hint">password is set in your .env file</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) document.getElementById('error').classList.add('show');
  </script>
</body>
</html>
